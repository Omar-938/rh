name: Tests & Déploiement (FTP)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ════════════════════════════════════════════════════════════
  # JOB 1 : Tests Pest
  # ════════════════════════════════════════════════════════════
  tests:
    name: Tests Pest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo_sqlite, sqlite3, openssl, bcmath, json, tokenizer, xml, ctype, fileinfo
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Installer les dépendances PHP
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copier .env de test
        run: cp .env.example .env

      - name: Générer la clé d'application
        run: php artisan key:generate

      - name: Lancer les tests Pest
        run: ./vendor/bin/pest --no-coverage

  # ════════════════════════════════════════════════════════════
  # JOB 2 : Build des assets frontend
  # ════════════════════════════════════════════════════════════
  build:
    name: Build Assets
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Installer les dépendances Node
        run: npm ci

      - name: Build de production (Vite)
        run: npm run build

      - name: Uploader les assets buildés
        uses: actions/upload-artifact@v4
        with:
          name: built-assets
          path: public/build/
          retention-days: 1

  # ════════════════════════════════════════════════════════════
  # JOB 3 : Déploiement FTP sur o2switch
  # (uniquement sur push vers main)
  # ════════════════════════════════════════════════════════════
  deploy:
    name: Déploiement FTP o2switch
    runs-on: ubuntu-latest
    needs: [tests, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Récupérer les assets buildés
        uses: actions/download-artifact@v4
        with:
          name: built-assets
          path: public/build/

      - name: Installer les dépendances PHP (pour exclure vendor du FTP)
        run: composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

      - name: Déploiement FTP — Fichiers principaux
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftps
          local-dir: ./
          server-dir: ${{ secrets.FTP_REMOTE_PATH }}/
          # Exclusions : ne pas écraser .env, storage, logs
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .github/**
            storage/app/documents/**
            storage/app/payslips/**
            storage/logs/**
            storage/framework/cache/**
            storage/framework/sessions/**
            storage/framework/views/**
            bootstrap/cache/**
            .env
            .env.*
            *.md

      - name: Attendre que le FTP soit finalisé
        run: sleep 10

      - name: Déclencher le script de déploiement (migrations + cache)
        run: |
          RESPONSE=$(curl -s -o /tmp/deploy_response.json -w "%{http_code}" \
            "https://${{ secrets.APP_URL }}/deploy-run.php?token=${{ secrets.DEPLOY_TOKEN }}")

          echo "=== Réponse du serveur ==="
          cat /tmp/deploy_response.json
          echo ""
          echo "=== Code HTTP: $RESPONSE ==="

          if [ "$RESPONSE" != "200" ]; then
            echo "❌ Le déploiement a échoué (HTTP $RESPONSE)"
            exit 1
          fi

          echo "✅ Déploiement terminé avec succès !"
