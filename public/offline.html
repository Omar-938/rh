<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1B4F72">
    <title>Hors ligne — SimpliRH</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #f8fafc;
            color: #1e293b;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 48px 32px;
            text-align: center;
            max-width: 400px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        }
        .icon {
            width: 80px;
            height: 80px;
            background: #eef4fb;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 36px;
        }
        h1 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #1b4f72;
        }
        p {
            color: #64748b;
            line-height: 1.6;
            margin-bottom: 28px;
        }
        button {
            background: #2e86c1;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
        }
        button:hover { background: #1b4f72; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">📡</div>
        <h1>Vous êtes hors ligne</h1>
        <p>Impossible de se connecter à SimpliRH. Vérifiez votre connexion internet et réessayez.</p>
        <button onclick="window.location.reload()">Réessayer</button>
    </div>
</body>
</html>
